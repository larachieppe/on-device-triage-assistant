<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Device Triage Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Loaded from a CDN rather than imported as an npm dependency: bundling
      onnxruntime-web pulls its ~27MB WASM binary into the Vite build as a
      static asset even though we only ever need it fetched at runtime (see
      ort.env.wasm.wasmPaths in src/ml/onnxClassifier.ts). This keeps it out
      of the deployed bundle entirely.
    -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.27.0/dist/ort.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
