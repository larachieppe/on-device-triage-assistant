# Render Blueprint — deploys the whole app in one shot from the Render
# dashboard: New + -> Blueprint -> select this repo. One Node web service,
# not a static site + a separate API: the build compiles web/ into static
# files, then server/index.js serves them itself alongside the
# /triage/fallback API — see the comment at the top of server/index.js for
# why that's one process instead of two services. Nothing to configure
# except ANTHROPIC_API_KEY (marked `sync: false` below, so Render prompts
# for it instead of it living in git).

services:
  - type: web
    name: on-device-triage-assistant
    runtime: node
    plan: free
    buildCommand: npm --prefix web ci && npm --prefix web run build && npm --prefix server ci
    startCommand: npm --prefix server start
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: GLOBAL_REQUEST_BUDGET
        value: "300"
